<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <title>Daniel Jabaraj V - Portfolio</title>
    <meta name="description" content="Portfolio of Daniel Jabaraj V - Full Stack Developer & Designer" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#030712', // grayish-black
                        primary: '#3b82f6', // blue
                        accent: '#8b5cf6', // purple
                        neon: '#0ea5e9', // sky blue
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                        'typing': 'typing 3s steps(40, end), blink .75s step-end infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 10px #3b82f6, 0 0 20px #3b82f6' },
                            '100%': { boxShadow: '0 0 20px #8b5cf6, 0 0 30px #8b5cf6' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #030712;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Preloader Animation Styles */
        #preloader {
            position: fixed;
            inset: 0;
            background: #030712;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1s ease-out, transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .terminal-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ef4444; }
        .dot-yellow { background: #eab308; }
        .dot-green { background: #22c55e; }

        .typewriter-text {
            font-family: 'Fira Code', monospace;
            color: #10b981;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: #3b82f6;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Fancy Elements */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #0ea5e9 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        /* Main app area, hidden initially */
        #app-content {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
        #app-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(59,130,246,0.8) 0%, rgba(139,92,246,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Skills hover effect */
        .skill-tag {
            transition: all 0.3s ease;
        }
        .skill-tag:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.8);
        }

        .contents {
            display: contents;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scroll-reverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
    </style>
    %sveltekit.head%
</head>
<body class="antialiased selection:bg-primary selection:text-white" data-sveltekit-preload-data="hover">
    <div class="contents">%sveltekit.body%</div>
</body>
</html>
